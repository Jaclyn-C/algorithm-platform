<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>算法训练平台 — 模型总览</title>
<link rel="stylesheet" href="common.css">
<style>
  .content { padding: 20px 24px; }
  .page-header { margin-bottom: 20px; }
  .page-header h2 { font-size: 20px; font-weight: 600; }

  .stats-row { display: flex; gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--card-shadow); padding: 16px 20px; text-align: center; flex: 1; }
  .stat-card .stat-value { font-size: 24px; font-weight: 700; }
  .stat-card .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

  .in-use-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .in-use-dot.on { background: var(--success); }
  .in-use-dot.off { background: #d9d9d9; }

  .ov-notes { max-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; padding: 2px 4px; border-radius: 3px; border: 1px solid transparent; min-height: 24px; line-height: 20px; color: var(--text-secondary); font-size: 12px; }
  .ov-notes:hover { background: #fafafa; border-color: #d9d9d9; }
  .ov-notes:empty::after { content: '双击添加备注'; color: var(--text-muted); font-style: italic; }
  .ov-notes.editing { background: #fff; border-color: var(--primary); outline: none; }

  .modal { width: 440px; max-height: 85vh; overflow: auto; }
  .modal-body { padding: 20px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
  .form-group:last-child { margin-bottom: 0; }
  .form-group label { font-size: 12px; color: var(--text-secondary); }
  .form-group input, .form-group select { padding: 7px 10px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 13px; font-family: var(--font); }
  .form-group input:focus, .form-group select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 2px rgba(24,144,255,0.15); }
  .file-upload-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border: 1px dashed #d9d9d9; border-radius: 4px; cursor: pointer; background: #fafafa; transition: var(--transition); }
  .file-upload-row:hover { border-color: var(--primary); background: var(--primary-light); }
  .file-upload-row.has-file { border-style: solid; background: #f6ffed; border-color: var(--success); }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">AI</div>
    <div class="sidebar-expand-btn" onclick="toggleSidebar()" title="展开侧边栏"><svg viewBox="0 0 20 20" fill="currentColor"><rect x="3" y="4" width="14" height="1.5" rx="0.5"/><rect x="3" y="9.25" width="14" height="1.5" rx="0.5"/><rect x="3" y="14.5" width="14" height="1.5" rx="0.5"/></svg></div>
    <div class="logo-text">算法训练平台</div>
    <div class="sidebar-collapse-btn" onclick="toggleSidebar()" title="收起侧边栏"><svg viewBox="0 0 20 20" fill="currentColor"><rect x="3" y="4" width="14" height="1.5" rx="0.5"/><rect x="3" y="9.25" width="10" height="1.5" rx="0.5"/><rect x="3" y="14.5" width="14" height="1.5" rx="0.5"/></svg></div>
  </div>
  
  <nav class="sidebar-nav">
    <div class="sidebar-group"><div class="sidebar-group-title">平台导航</div>
      <a class="sidebar-item" href="my_projects.html" data-icon="📁">个人项目</a>
      <a class="sidebar-item" href="projects.html" data-icon="👥">团队项目</a>
      <a class="sidebar-item active" href="#" data-icon="📊">模型总览</a>
      <a class="sidebar-item" href="models_use.html" data-icon="🔍">模型使用</a>
      <a class="sidebar-item" href="training_queue.html" data-icon="📋">训练队列</a>
    </div>
    <div class="sidebar-group"><div class="sidebar-group-title">系统设置</div>
      <a class="sidebar-item" href="team_manage.html" data-icon="⚙">团队管理</a>
      <a class="sidebar-item" href="profile.html" data-icon="👤">个人中心</a>
    </div>
  </nav>
</aside>
<script>(function(){var s=document.querySelector(".sidebar");if(s&&localStorage.getItem("sidebar_collapsed")==="true"){s.classList.add("collapsed")}}())</script>

<div class="main">
  <header class="header">
    <div class="breadcrumb"><a href="my_projects.html" style="color:var(--text-secondary);text-decoration:none;" data-icon="🏠">首页</a> <span class="sep">›</span> <span>模型总览</span></div>
    <div class="header-actions">
      <div class="user-menu" onclick="document.getElementById('userDropdown').classList.toggle('show')">
        <span style="font-size:12px;" id="headerUserName">用户</span>
        <div id="headerUserAvatar" style="width:30px;height:30px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;">U</div>
        <div class="user-dropdown" id="userDropdown">
          <a href="profile.html">个人中心</a>
          <a href="#" onclick="event.stopPropagation();logout()">退出登录</a>
        </div>

    </div>
  </header>

  <div class="content">
    <div class="page-header">
      <h2>模型总览</h2>
      <div style="display:flex;gap:8px;align-items:center;">
        <select id="projectFilter" onchange="onProjectFilter()" style="padding:6px 10px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;font-family:var(--font);min-width:160px;">
          <option value="all">全部项目</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="openImportModal()">+ 导入模型</button>
        <button class="btn btn-danger btn-sm" id="btnBatchDelete" onclick="openBatchDeleteModal()" disabled>批量删除 (<span id="selectedCount">0</span>)</button>      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-value" style="color:var(--text);" id="statTotal">0</div><div class="stat-label">模型总数</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--success);" id="statInUse">0</div><div class="stat-label">使用中</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--primary);" id="statProjects">0</div><div class="stat-label">涉及项目</div></div>
    </div>

    <!-- Table -->
    <div class="card">
      <div class="card-body" style="padding:0;">
        <table class="table">
          <thead>
            <tr>
              <th style="width:36px;"><input type="checkbox" id="checkAll" onchange="toggleSelectAll(this)" style="accent-color:var(--primary);"></th>
              <th style="width:50px;">#</th>

              <th style="width:80px;">训练阶段</th>

              <th style="width:80px;">操作</th>

  </div>
</div>

<!-- Import Modal -->
<div class="modal-overlay" id="importModal" style="display:none;" onclick="if(event.target==this)closeImportModal()">
  <div class="modal">
    <div class="modal-header">
      导入模型
      <button class="modal-close" onclick="closeImportModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>上传 .pt 模型文件</label>

      <div class="form-group">

<!-- Batch Delete Confirm Modal -->
<div class="modal-overlay" id="batchDeleteModal" style="display:none;" onclick="if(event.target==this)closeBatchDeleteModal()">
  <div class="modal" style="width:440px;">
    <div class="modal-header">
      确认批量删除

    </div>
    <div class="modal-body">
      <div style="margin-bottom:12px;font-size:13px;">
        确定要删除选中的 <strong id="batchDeleteCount">0</strong> 个模型吗？

      <div style="background:#fff1f0;border:1px solid #ffccc7;border-radius:4px;padding:12px;font-size:12px;">

      </div>

      <button class="btn btn-default btn-sm" onclick="closeBatchDeleteModal()">取消</button>

    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="common.js"></script>
<script>
// ── Model registry (all models across all projects) ──
var MODELS_KEY = 'platform_models';
function loadModels() {
  try { var saved = JSON.parse(localStorage.getItem(MODELS_KEY)); if (saved && saved.length > 0) return saved; } catch(e) {}
  return null;
}
function saveDefaultModels() {
  if (!localStorage.getItem(MODELS_KEY)) {
    // These are the ALL_MODELS array defaults — save them on first access
    var defaults = [
      { id: 1, project: '保安服检测', time: '2026-07-02 15:30', model: 'best.pt', version: 'v1.3.0', epochs: 800, mAP50: '0.872', mAP5095: '0.651', inUse: true, pretrained: 'yolo11m.pt', size: '12.8 MB', notes: '', stage: '已完成' },
      { id: 2, project: '保安服检测', time: '2026-06-28 09:15', model: 'best.pt', version: 'v1.2.0', epochs: 500, mAP50: '0.851', mAP5095: '0.624', inUse: false, pretrained: 'yolo11m.pt', size: '12.7 MB', notes: '检测精度略有下降', stage: '已完成' },
      { id: 3, project: '保安服检测', time: '2026-06-20 14:00', model: 'last.pt', version: 'v1.1.0', epochs: 500, mAP50: '0.813', mAP5095: '0.587', inUse: false, pretrained: 'yolo11n.pt', size: '5.9 MB', notes: '', stage: '已终止' },
      { id: 4, project: '烟火检测', time: '2026-07-05 10:20', model: 'best.pt', version: 'v2.0.0', epochs: 1000, mAP50: '0.918', mAP5095: '0.734', inUse: false, pretrained: 'yolo11m.pt', size: '12.9 MB', notes: '误报率偏高，需调整阈值', stage: '训练中' },
      { id: 5, project: '烟火检测', time: '2026-06-30 16:45', model: 'best.pt', version: 'v1.0.0', epochs: 600, mAP50: '0.886', mAP5095: '0.691', inUse: false, pretrained: 'yolo11m.pt', size: '12.8 MB', notes: '', stage: '已完成' },
      { id: 6, project: '安全帽检测', time: '2026-07-08 11:00', model: 'best.pt', version: 'v1.0.0', epochs: 800, mAP50: '0.835', mAP5095: '0.612', inUse: true, pretrained: 'yolo11m.pt', size: '12.8 MB', notes: '', stage: '已完成' },
      { id: 7, project: '安全帽检测', time: '2026-06-20 14:00', model: 'best.pt', version: 'v0.5.0', epochs: 500, mAP50: '0.784', mAP5095: '0.543', inUse: false, pretrained: 'yolo11n.pt', size: '5.9 MB', notes: '', stage: '已终止' },
    ];
    localStorage.setItem(MODELS_KEY, JSON.stringify(defaults));
  }
}
function saveModels() { try { localStorage.setItem(MODELS_KEY, JSON.stringify(ALL_MODELS)); } catch(e) {} }

const ALL_MODELS = loadModels() || [
  { id: 1, project: '保安服检测', time: '2026-07-02 15:30', model: 'best.pt', version: 'v1.3.0', epochs: 800, mAP50: '0.872', mAP5095: '0.651', inUse: true, pretrained: 'yolo11m.pt', size: '12.8 MB', notes: '', stage: '已完成' },
  { id: 2, project: '保安服检测', time: '2026-06-28 09:15', model: 'best.pt', version: 'v1.2.0', epochs: 500, mAP50: '0.851', mAP5095: '0.624', inUse: false, pretrained: 'yolo11m.pt', size: '12.7 MB', notes: '检测精度略有下降', stage: '已完成' },
  { id: 3, project: '保安服检测', time: '2026-06-20 14:00', model: 'last.pt', version: 'v1.1.0', epochs: 500, mAP50: '0.813', mAP5095: '0.587', inUse: false, pretrained: 'yolo11n.pt', size: '5.9 MB', notes: '', stage: '已终止' },
  { id: 4, project: '烟火检测', time: '2026-07-05 10:20', model: 'best.pt', version: 'v2.0.0', epochs: 1000, mAP50: '0.918', mAP5095: '0.734', inUse: false, pretrained: 'yolo11m.pt', size: '12.9 MB', notes: '误报率偏高，需调整阈值', stage: '训练中' },
  { id: 5, project: '烟火检测', time: '2026-06-30 16:45', model: 'best.pt', version: 'v1.0.0', epochs: 600, mAP50: '0.886', mAP5095: '0.691', inUse: false, pretrained: 'yolo11m.pt', size: '12.8 MB', notes: '', stage: '已完成' },
  { id: 6, project: '安全帽检测', time: '2026-07-08 11:00', model: 'best.pt', version: 'v1.0.0', epochs: 800, mAP50: '0.835', mAP5095: '0.612', inUse: true, pretrained: 'yolo11m.pt', size: '12.8 MB', notes: '', stage: '已完成' },
  { id: 7, project: '安全帽检测', time: '2026-06-20 14:00', model: 'best.pt', version: 'v0.5.0', epochs: 500, mAP50: '0.784', mAP5095: '0.543', inUse: false, pretrained: 'yolo11n.pt', size: '5.9 MB', notes: '', stage: '已终止' },
];

// ── Render table ──
var filteredModels = [];

function populateProjectFilter() {
  var projects = {};
  ALL_MODELS.forEach(function(m) { projects[m.project] = true; });
  var sel = document.getElementById('projectFilter');
  // Keep only the "全部项目" option, remove the rest
  while (sel.options.length > 1) { sel.remove(1); }
  var keys = Object.keys(projects);
  keys.forEach(function(p) {
    var opt = document.createElement('option');
    opt.value = p;
    opt.textContent = p;
    sel.appendChild(opt);
  });
}

function onProjectFilter() {
  var val = document.getElementById('projectFilter').value;
  filteredModels = val === 'all' ? ALL_MODELS.slice() : ALL_MODELS.filter(function(m) { return m.project === val; });
  renderModelTable();
}

function renderModelTable() {
  var body = document.getElementById('modelsBody');
  body.innerHTML = '';
  var models = filteredModels.length > 0 ? filteredModels : ALL_MODELS;
  var projects = {};

  models.forEach(function(m, i) {
    projects[m.project] = true;
    var stage = m.stage || '';
    var stageTag = '';
    if (stage === '训练中') {
      stageTag = '<span class="tag" style="background:#fff7e6;color:#fa8c16;">训练中</span>';
    } else if (stage === '已完成') {
      stageTag = '<span class="tag tag-success">已完成</span>';
    } else if (stage === '已终止') {
      stageTag = '<span class="tag" style="background:#fff1f0;color:#ff4d4f;">已终止</span>';
    } else {
      stageTag = '<span class="text-muted">—</span>';
    }

    var inUseHtml = m.inUse
      ? '<span style="color:var(--success);"><span class="in-use-dot on"></span>使用中</span>'
      : '<span class="text-muted"><span class="in-use-dot off"></span>—</span>';

    var row = '<tr>' +
      '<td><input type="checkbox" class="row-checkbox" data-modelid="' + m.id + '" onchange="updateSelectedCount()" style="accent-color:var(--primary);"></td>' +
      '<td>' + (i + 1) + '</td>' +
      '<td style="font-weight:500;">' + m.project + '</td>' +
      '<td>' + (m.time || '<span class="text-muted">—</span>') + '</td>' +
      '<td>' +
        '<div style="font-weight:600;">' + m.model + '</div>' +
        '<div style="font-size:11px;color:var(--text-muted);">' + (m.pretrained || '导入模型') + ' · ' + (m.size || '—') + '</div>' +
      '</td>' +
      '<td><span style="color:var(--primary);font-weight:600;">' + m.version + '</span></td>' +
      '<td style="color:var(--success);font-weight:600;">' + (m.mAP50 || '<span class="text-muted">—</span>') + '</td>' +
      '<td>' + stageTag + '</td>' +
      '<td>' + inUseHtml + '</td>' +
      '<td><div class="ov-notes" data-modelid="' + m.id + '" ondblclick="startEditModelNotes(this)" title="双击编辑备注">' + escapeHTML(m.notes || '') + '</div></td>' +
      '<td><button class="btn btn-text btn-sm" onclick="exportModel(\'' + m.project + '\', \'' + m.version + '\')" style="color:var(--primary);">导出</button></td>' +
    '</tr>';
    body.innerHTML += row;
  });

  document.getElementById('statTotal').textContent = models.length;
  document.getElementById('statInUse').textContent = models.filter(function(m) { return m.inUse; }).length;
  document.getElementById('statProjects').textContent = Object.keys(projects).length;
  // Reset selection
  var ca = document.getElementById('checkAll');
  if (ca) ca.checked = false;
  document.getElementById('selectedCount').textContent = '0';
  document.getElementById('btnBatchDelete').disabled = true;
}

// ── Batch delete ──
function updateSelectedCount() {
  var checked = document.querySelectorAll('#modelsBody .row-checkbox:checked');
  var count = checked.length;
  document.getElementById('selectedCount').textContent = count;
  document.getElementById('btnBatchDelete').disabled = count === 0;
}

function toggleSelectAll(el) {
  var checkboxes = document.querySelectorAll('#modelsBody .row-checkbox');
  checkboxes.forEach(function(cb) { cb.checked = el.checked; });
  updateSelectedCount();
}

function openBatchDeleteModal() {
  var count = document.querySelectorAll('#modelsBody .row-checkbox:checked').length;
  if (count === 0) return;
  document.getElementById('batchDeleteCount').textContent = count;
  document.getElementById('batchDeleteModal').style.display = 'flex';
}

function closeBatchDeleteModal() {
  document.getElementById('batchDeleteModal').style.display = 'none';
}

function executeBatchDelete() {
  var checked = document.querySelectorAll('#modelsBody .row-checkbox:checked');
  var idsToDelete = [];
  checked.forEach(function(cb) { idsToDelete.push(parseInt(cb.getAttribute('data-modelid'))); });

  // Remove from ALL_MODELS
  for (var i = ALL_MODELS.length - 1; i >= 0; i--) {
    if (idsToDelete.indexOf(ALL_MODELS[i].id) !== -1) {
      ALL_MODELS.splice(i, 1);
    }
  }

  // Reset selection
  document.getElementById('checkAll').checked = false;
  document.getElementById('selectedCount').textContent = '0';
  document.getElementById('btnBatchDelete').disabled = true;

  saveModels();

  closeBatchDeleteModal();
  populateProjectFilter();
  onProjectFilter();
  showToast('已删除 ' + idsToDelete.length + ' 个模型');
}

// ── Export ──
function exportModel(project, version) {
  var fileName = project + '_' + version + '.pt';
  showToast('正在导出 ' + fileName + ' ...');
  setTimeout(function() {
    showToast(fileName + ' 已下载');
  }, 800);
}

// ── Model notes editing ──
function escapeHTML(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function startEditModelNotes(el) {
  if (el.classList.contains('editing')) return;
  var currentText = el.textContent.trim();
  el.classList.add('editing');
  el.contentEditable = 'true';
  el.focus();
  var range = document.createRange();
  range.selectNodeContents(el);
  var sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);

  function finish() {
    el.contentEditable = 'false';
    el.classList.remove('editing');
    var newText = el.textContent.trim();
    var modelId = parseInt(el.getAttribute('data-modelid'));
    var model = ALL_MODELS.find(function(m) { return m.id === modelId; });
    if (model) { model.notes = newText; }
    if (!newText && !el.textContent.trim()) { el.textContent = ''; }
    el.removeEventListener('blur', finish);
    el.removeEventListener('keydown', onKey);
  }

  function onKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); finish(); }
    if (e.key === 'Escape') { el.textContent = currentText; finish(); }
  }

  el.addEventListener('blur', finish);
  el.addEventListener('keydown', onKey);
}

// ── Import ──
var importFileName = '';
var importFileSize = '';

function openImportModal() {
  document.getElementById('importModal').style.display = 'flex';
  document.getElementById('importProject').value = '';
  document.getElementById('importVersion').value = '';
  document.getElementById('importFileName').textContent = '点击选择 .pt 文件';
  document.getElementById('importFileRow').classList.remove('has-file');
  importFileName = '';
  importFileSize = '';
  // Populate project suggestions
  var projects = {};
  ALL_MODELS.forEach(function(m) { projects[m.project] = true; });
  var datalist = document.getElementById('projectSuggest');
  datalist.innerHTML = Object.keys(projects).map(function(p) { return '<option value="' + p + '">'; }).join('');
}

function closeImportModal() {
  document.getElementById('importModal').style.display = 'none';
}

function handleImportFile(files) {
  if (!files || files.length === 0) return;
  var f = files[0];
  importFileName = f.name;
  importFileSize = f.size < 1048576 ? (f.size / 1024).toFixed(1) + ' KB' : (f.size / 1048576).toFixed(1) + ' MB';
  document.getElementById('importFileName').textContent = importFileName + ' (' + importFileSize + ')';
  document.getElementById('importFileRow').classList.add('has-file');
}

function executeImport() {
  if (!importFileName) { showToast('请上传 .pt 模型文件'); return; }
  var project = document.getElementById('importProject').value.trim();
  if (!project) { showToast('请输入项目名称'); return; }
  var version = document.getElementById('importVersion').value.trim();
  if (!version) { showToast('请输入模型名'); return; }

  var now = new Date();
  var timeStr = now.toISOString().slice(0, 16).replace('T', ' ');

  var newModel = {
    id: Date.now(),
    project: project,
    time: timeStr,
    model: importFileName,
    version: version,
    epochs: '—',
    mAP50: '',    // 导入的模型没有 mAP
    mAP5095: '',
    inUse: false,
    pretrained: '',
    size: importFileSize,
    notes: '',
  };

  ALL_MODELS.unshift(newModel);
  saveModels();
  closeImportModal();
  var currentFilter = document.getElementById('projectFilter').value;
  populateProjectFilter();
  document.getElementById('projectFilter').value = currentFilter || 'all';
  filteredModels = (currentFilter === 'all' || !currentFilter)
    ? ALL_MODELS.slice()
    : ALL_MODELS.filter(function(m) { return m.project === currentFilter; });
  renderModelTable();
  showToast('模型 ' + importFileName + ' 已导入');
}

// ── Toast ──
function showToast(msg) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(function() { toast.classList.remove('show'); }, 2000);
}

// ── Auth ──
(function() {
  var user = getUser();
  if (!user) { location.href = 'login.html'; return; }
  document.getElementById('headerUserName').textContent = user.name;
  document.getElementById('headerUserAvatar').textContent = user.avatar || user.name.charAt(0);
  filteredModels = ALL_MODELS.slice();
  saveModels();
  populateProjectFilter();
  renderModelTable();
})();

</script>
</body>
</html>
