  .pipe-dot.wait { background: #e0e0e0; }
  .pipeline .pipe-label { font-size: 10px; color: var(--text-muted); }
  .pipeline .pipe-arrow { color: #d9d9d9; font-size: 10px; flex-shrink: 0; padding: 0 2px; margin-bottom: 14px; }

// ── Teams ──
var TEAMS_KEY = 'platform_teams';
function initTeams() {
  if (!localStorage.getItem(TEAMS_KEY)) {
    localStorage.setItem(TEAMS_KEY, JSON.stringify([
      { id: 'team_anbao', name: '安保检测组', createdAt: '2026-05-01' },
      { id: 'team_xiaofang', name: '消防安全组', createdAt: '2026-06-01' },
      { id: 'team_default', name: '默认团队', createdAt: '2026-04-01' },
    ]));
  }
}

function getTeams() {
  try { return JSON.parse(localStorage.getItem(TEAMS_KEY)) || []; } catch(e) { return []; }
}

// ── Project data with teamId ──
function initProjects() {
  var pl = JSON.parse(localStorage.getItem('project_list') || '[]');
  if (pl.length === 0) {
    pl = [
      { id: 'security', name: '保安服检测', createdAt: '2026-06-28', teamId: 'team_anbao' },
      { id: 'fire',     name: '烟火检测',   createdAt: '2026-07-01', teamId: 'team_xiaofang' },
      { id: 'helmet',   name: '安全帽检测', createdAt: '2026-07-02', teamId: 'team_default' },
    ];
    localStorage.setItem('project_list', JSON.stringify(pl));
  }
  // 确保旧数据也有 teamId，没有的话补上
  var presetTeamMap = { security: 'team_anbao', fire: 'team_xiaofang', helmet: 'team_default' };
  var changed = false;
  pl.forEach(function(p) {
    if (!p.teamId) {
      p.teamId = presetTeamMap[p.id] || 'team_default';
      changed = true;
    }
  });
  if (changed) { localStorage.setItem('project_list', JSON.stringify(pl)); }
}

// ── Preset project card data ──
var PRESET_INFO = {
  security: { icon: '👮', color: '#1890ff,#36cfc9' },
  fire:     { icon: '🔥', color: '#fa8c16,#f5222d' },
  helmet:   { icon: '🪖', color: '#722ed1,#eb2f96' },
};

function getCardColor(id) {
  var colors = ['#1890ff,#36cfc9','#fa8c16,#f5222d','#722ed1,#eb2f96','#52c41a,#13c2c2','#2f54eb,#a0d911'];
  var idx = (id.charCodeAt(5) || 0) % colors.length;
  return colors[idx];
}

// ── Populate team filter dropdown ──
function populateTeamFilter() {
  var teams = getTeams();
  var sel = document.getElementById('teamFilter');
  while (sel.options.length > 1) sel.remove(1);
  teams.forEach(function(t) {
    var opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = t.name;
    sel.appendChild(opt);
  });
}

// ── Compute pipeline stage from data ──
function getProjDataStatus(projectName) {
  var datasets = [];
  try { datasets = JSON.parse(localStorage.getItem('platform_datasets')) || []; } catch(e) {}
  var pipeStatus = {};
  try { pipeStatus = JSON.parse(localStorage.getItem('pipeline_annotation_status')) || {}; } catch(e) {}
  var models = [];
  try { models = JSON.parse(localStorage.getItem('platform_models')) || []; } catch(e) {}

  // Filter datasets by project
  datasets = datasets.filter(function(b) { return b.project === projectName; });

  // Check which stages have data
  var hasData = { files: false, extracted: false, dedup: false, labeled: false, train: false, val: false };
  datasets.forEach(function(b) {
    b.children.forEach(function(c) {
      if (c.key.indexOf('raw_videos') === 0) hasData.files = true;
      if (c.key.indexOf('extracted') === 0) hasData.extracted = true;
      if (c.key.indexOf('deduplicated') === 0) hasData.dedup = true;
      if (c.key.indexOf('labeled') === 0) hasData.labeled = true;
      if (c.key.indexOf('train') === 0) hasData.train = true;
      if (c.key.indexOf('val') === 0) hasData.val = true;
    });
  });

  // Check if ANY deduplicated has annotation in progress
  var dedupKeys = [];
  datasets.forEach(function(b) {
    b.children.forEach(function(c) {
      if (c.key.indexOf('deduplicated') === 0) dedupKeys.push(c.key);
    });
  });
  var hasRunning = false;
  dedupKeys.forEach(function(key) {
    var suffix = key.replace('deduplicated', '') || '_01';
    var st = pipeStatus['p' + suffix] || '';
    if (st === 'in_progress' || st === 'review') hasRunning = true;
  });

  // Check models for this project
  var projModels = models.filter(function(m) { return m.project === projectName; });
  var hasModel = projModels.length > 0;
  var hasEval = projModels.some(function(m) { return m.mAP50 && m.mAP50 !== '-'; });
  var hasDeploy = projModels.some(function(m) { return m.inUse; });

  // Determine stage label
  var stageLabel, stageClass;
  if (hasDeploy) { stageLabel = '迭代中'; stageClass = 'tag-iterating'; }
  else if (hasEval) { stageLabel = '已完成'; stageClass = 'tag-success'; }
  else if (hasModel) { stageLabel = '训练中'; stageClass = 'tag-processing'; }
  else if (hasRunning) { stageLabel = '标注中'; stageClass = 'tag-processing'; }
  else if (hasData.dedup) { stageLabel = '待标注'; stageClass = 'tag-warning'; }
  else if (hasData.files) { stageLabel = '数据准备'; stageClass = 'tag-warning'; }
  else { stageLabel = '待开始'; stageClass = 'tag-warning'; }

  // Pipeline dots: data→标注→训练→评估→部署→迭代
  var pipe = [];
  pipe.push(hasData.files ? 'done' : 'wait');           // 数据
  pipe.push(hasData.dedup ? (hasRunning ? 'active' : 'done') : 'wait');  // 标注
  pipe.push(hasModel ? 'done' : 'wait');                  // 训练
  pipe.push(hasEval ? 'done' : 'wait');                   // 评估
  pipe.push(hasDeploy ? 'done' : 'wait');                 // 部署
  pipe.push(hasDeploy ? 'active' : 'wait');               // 迭代

  return { stageLabel: stageLabel, stageClass: stageClass, pipe: pipe };
}

function onTeamFilter() {
  renderAllProjects();
}

// ── Compute project stats dynamically ──
function computeProjectStats(projectName) {
  var datasets = [];
  try { datasets = JSON.parse(localStorage.getItem('platform_datasets')) || []; } catch(e) {}
  var pipeStatus = {};
  try { pipeStatus = JSON.parse(localStorage.getItem('pipeline_annotation_status')) || {}; } catch(e) {}
  var models = [];
  try { models = JSON.parse(localStorage.getItem('platform_models')) || []; } catch(e) {}

  // Count batches & total deduplicated images
  // Filter datasets by project
  datasets = datasets.filter(function(b) { return b.project === projectName; });
  var batchCount = datasets.length;
  var totalDedupImgs = 0;
  var dedupKeys = [];  // collect deduplicated keys for status check
  datasets.forEach(function(b) {
    b.children.forEach(function(c) {
      if (c.key.indexOf('deduplicated') === 0) {
        var match = c.count.match(/(\d[\d,]*)/);
        if (match) totalDedupImgs += parseInt(match[1].replace(/,/g, ''));
        dedupKeys.push(c.key);
      }
    });
  });

  // Annotation status aggregation
  var annoDone = 0, annoPending = 0, annoReview = 0;
  dedupKeys.forEach(function(key) {
    var suffix = key.replace('deduplicated', '') || '_01';
    var status = pipeStatus['p' + suffix] || '';
    if (status === 'review') annoReview++;
    else if (status === 'in_progress') annoPending++;
    else {
      // Check if labeled exists downstream → done
      var hasLabeled = false;
      datasets.forEach(function(b) {
        b.children.forEach(function(c) {
          if (c.key.indexOf('labeled') === 0 && c.key.replace('labeled','') === key.replace('deduplicated','')) {
            hasLabeled = true;
          }
        });
      });
      if (hasLabeled) annoDone++;
    }
  });
  var annoTotal = dedupKeys.length;

  // Model stats — find best model for this project
  var projModels = models.filter(function(m) { return m.project === projectName; });
  var bestModel = null;
  var inUseModel = projModels.filter(function(m) { return m.inUse; })[0];
  if (inUseModel) {
    bestModel = inUseModel;
  } else {
    // Find one with highest mAP
    projModels.forEach(function(m) {
      if (m.mAP50 && (!bestModel || parseFloat(m.mAP50) > parseFloat(bestModel.mAP50 || '0'))) {
        bestModel = m;
      }
    });
  }

  // Build stats HTML
  var parts = [];
  if (bestModel) {
    parts.push('<span>模型：<strong>' + bestModel.model + ' ' + bestModel.version + '</strong></span>');
    if (bestModel.mAP50) parts.push('<span>mAP@50：<strong style="color:var(--success);">' + bestModel.mAP50 + '</strong></span>');
  }
  parts.push('<span>数据集：<strong>' + batchCount + ' 个批次 / ' + totalDedupImgs.toLocaleString() + ' 张</strong></span>');

  // Annotation summary
  if (annoTotal > 0) {
    var annoLabels = [];
    if (annoDone > 0) annoLabels.push(annoDone + ' 个完成');
    if (annoReview > 0) annoLabels.push(annoReview + ' 个待审核');
    if (annoPending > 0) annoLabels.push(annoPending + ' 个进行中');
    var untouched = annoTotal - annoDone - annoReview - annoPending;
    if (untouched > 0) annoLabels.push(untouched + ' 个未开始');
    parts.push('<span>标注：<strong>' + annoLabels.join(' · ') + '</strong></span>');
  } else {
    parts.push('<span>标注：<strong>暂无数据</strong></span>');
  }

  return parts.join('');
}

// ── Render all project cards ──
function renderAllProjects() {
  var grid = document.getElementById('projectGrid');
  grid.innerHTML = '';
  var teamFilter = document.getElementById('teamFilter').value;

  var pl = JSON.parse(localStorage.getItem('project_list') || '[]');
  var teams = getTeams();

  pl.forEach(function(p) {
    // Filter by team
    if (teamFilter !== 'all' && p.teamId !== teamFilter) return;

    var info = PRESET_INFO[p.id];
    var isPreset = !!info;
    var isShared = p._fromPersonal || false;
    var teamName = '';
    var team = teams.find(function(t) { return t.id === p.teamId; });
    if (team) teamName = team.name;

    // Shared / Team badge
    var shareLabel = isShared
      ? '<span class="tag" style="background:#e6f7ff;color:#1890ff;margin-left:6px;">个人共享</span>'
      : '';

    // Stage & Pipeline — computed from data
    var projStats = getProjDataStatus(p.name);
    var stageTag = '<span class="tag ' + projStats.stageClass + '" style="margin-left:auto;">' + projStats.stageLabel + '</span>';
    var pipeDots = projStats.pipe;
    var labels = ['数据','标注','训练','评估','部署','迭代'];
    var pipelineHtml = '';
    for (var i = 0; i < 6; i++) {
      pipelineHtml += '<div class="pipe-step"><div class="pipe-dot ' + pipeDots[i] + '"></div><div class="pipe-label">' + labels[i] + '</div></div>';
      if (i < 5) pipelineHtml += '<div class="pipe-arrow">→</div>';
    }

    // Stats — computed dynamically
    var statsHtml = computeProjectStats(p.name);

    // Icon & color
    var iconChar, iconColor;
    if (isPreset) {
      iconChar = info.icon;
      iconColor = info.color;
    } else {
      iconChar = p.name.charAt(0);
      iconColor = getCardColor(p.id);
    }

    // Date
    var dateExtra = isPreset ? (info.dateExtra || '') : '';

    // Team info line
    var teamLine = '';
    if (teamFilter === 'all') {
      teamLine = '<div style="font-size:10px;color:var(--text-muted);margin-top:2px;">' + teamName + '</div>';
    }

    var card = document.createElement('div');
    card.className = 'project-card';
    card.setAttribute('data-project-id', p.id);
    card.onclick = function() { enterProject(p.id); };
    card.innerHTML =
      '<div class="p-header">' +
        '<div class="p-icon" style="background:linear-gradient(135deg,' + iconColor + ');">' + iconChar + '</div>' +
        '<div>' +
          '<div class="p-name">' + p.name + shareLabel + '</div>' +
          '<div class="p-date">创建于 ' + p.createdAt + dateExtra + teamLine + '</div>' +
        '</div>' +
        stageTag +
      '</div>' +
      '<div class="pipeline">' + pipelineHtml + '</div>' +
      '<div class="p-stats">' + statsHtml + '</div>' +
      '<div style="display:flex;gap:6px;justify-content:space-between;" onclick="event.stopPropagation();">' +
        '<button class="btn btn-default btn-sm" onclick="enterProject(\'' + p.id + '\')">进入算法</button>' +
        (canDeleteProject(p) ? '<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();confirmDeleteProject(\'' + p.id + '\',\'' + p.name + '\')">删除</button>' : '') +
      '</div>';
    grid.appendChild(card);
  });
}

var currentLoginUser = '';

function canDeleteProject(p) {
  if (p.id === 'security' || p.id === 'fire' || p.id === 'helmet') {
    var teams = getTeams();
    // Map preset ids to teamIds
    var tid = { security: 'team_anbao', fire: 'team_xiaofang', helmet: 'team_default' }[p.id];
    var team = teams.find(function(t) { return t.id === tid; });
    if (team) {
      return team.owner === currentLoginUser || (team.members || []).some(function(m) { return m.username === currentLoginUser && (m.role === 'admin' || m.role === 'owner'); });
    }
    return true;
  }
  var team = getTeams().find(function(t) { return t.id === p.teamId; });
  if (team) {
    return team.owner === currentLoginUser || (team.members || []).some(function(m) { return m.username === currentLoginUser && (m.role === 'admin' || m.role === 'owner'); });
  }
  // No team info, default to allow (e.g. personal shared projects)
  return true;
}

// ── Delete ──
function confirmDeleteProject(projectId, projectName) {
  document.getElementById('deleteProjectId').value = projectId;
  document.getElementById('deleteProjectName').textContent = projectName;
  document.getElementById('deleteInputName').value = '';
  document.getElementById('btnConfirmDelete').disabled = true;
  document.getElementById('deleteProjectModal').style.display = 'flex';
  setTimeout(function() { document.getElementById('deleteInputName').focus(); }, 100);
}
function checkDeleteInput() {
  var inputName = document.getElementById('deleteInputName').value.trim();
  var projectName = document.getElementById('deleteProjectName').textContent;
  document.getElementById('btnConfirmDelete').disabled = (inputName !== projectName);
}
function closeDeleteProjectModal() {
  document.getElementById('deleteProjectModal').style.display = 'none';
  document.getElementById('deleteInputName').value = '';
}
function executeDeleteProject() {
  var id = document.getElementById('deleteProjectId').value;
  var name = document.getElementById('deleteProjectName').textContent;
  var inputName = document.getElementById('deleteInputName').value.trim();
  if (inputName !== name) { showToast('算法名称不匹配，无法删除'); return; }
  var pl = JSON.parse(localStorage.getItem('project_list') || '[]');
  var item = pl.find(function(p) { return p.id === id; });
  pl = pl.filter(function(p) { return p.id !== id; });
  localStorage.setItem('project_list', JSON.stringify(pl));
  if (item && item._fromPersonal) {
    var personal = JSON.parse(localStorage.getItem('personal_projects') || '[]');
    var pp = personal.find(function(p) { return p.id === id; });
    if (pp) { pp._shared = false; localStorage.setItem('personal_projects', JSON.stringify(personal)); }
  }
  closeDeleteProjectModal();
  renderAllProjects();
  showToast('算法「' + name + '」已删除');
}
</script>
<div class="modal-overlay" id="deleteProjectModal" style="display:none;" onclick="if(event.target==this)closeDeleteProjectModal()">
  <div class="modal" style="width:480px;">
    <div class="modal-header">
      确认删除算法
      <button class="modal-close" onclick="closeDeleteProjectModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="deleteProjectId">
      <div style="margin-bottom:14px;font-size:13px;">确定要删除算法「<strong id="deleteProjectName"></strong>」吗？此操作<strong>不可撤销</strong>，请手动输入算法名称确认：</div>
      <input type="text" id="deleteInputName" placeholder="请输入算法名称以确认删除" style="width:100%;padding:8px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;font-family:var(--font);margin-bottom:14px;outline:none;" oninput="checkDeleteInput()">
      <div style="background:#fff1f0;border:1px solid #ffccc7;border-radius:4px;padding:12px;font-size:12px;">
        <strong>以下内容将被一并删除：</strong><br>
        &emsp;→ 该算法下的全部数据集<br>
        &emsp;→ 全部标注数据<br>
        &emsp;→ 全部训练记录和模型文件<br>
        &emsp;→ 全部评估记录<br>
        &emsp;→ 全部部署记录和部署包
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default btn-sm" onclick="closeDeleteProjectModal()">取消</button>
      <button class="btn btn-danger btn-sm" onclick="executeDeleteProject()" id="btnConfirmDelete" disabled>确认删除</button>
    </div>
  </div>
</div>
